name: Reverse Engineer Analyser

on:
  push:
    paths:
      - 'binaries/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python & Java
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y zip unzip wget tar jq lsb-release

      - name: Install Python Tools (Magika & Capa)
        run: pip install magika flare-capa

      - name: Install Detect-It-Easy (DIE)
        run: |
          OS_VER=$(lsb_release -rs)
          API_URL="https://api.github.com/repos/horsicq/Detect-It-Easy/releases/latest"
          DOWNLOAD_URL=$(curl -s $API_URL | jq -r ".assets[] | select(.name | test(\"Ubuntu_${OS_VER}_amd64.deb\")) | .browser_download_url")
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            DOWNLOAD_URL=$(curl -s $API_URL | jq -r '.assets[] | select(.name | test("Ubuntu_22.04_amd64.deb")) | .browser_download_url' | head -n 1)
          fi
          
          wget $DOWNLOAD_URL -O die.deb
          sudo apt-get install -y ./die.deb

      - name: Install FLOSS
        run: |
          wget https://github.com/mandiant/flare-floss/releases/latest/download/floss-linux.zip
          unzip floss-linux.zip
          chmod +x floss
          sudo mv floss /usr/local/bin/

      - name: Install Rizin
        run: |
          wget https://github.com/rizinorg/rizin/releases/latest/download/rizin-linux-x86_64.AppImage -O rizin
          chmod +x rizin
          sudo mv rizin /usr/local/bin/

      - name: Install Ghidra
        run: |
          wget https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.0.3_build/ghidra_11.0.3_PUBLIC_20240410.zip
          unzip ghidra_11.0.3_PUBLIC_20240410.zip
          mv ghidra_11.0.3_PUBLIC ghidra

      - name: Execute Pipeline on NEW Files Only
        run: |
          mkdir -p reports
          
          NEW_FILES=$(git diff --name-only --diff-filter=AM ${{ github.event.before }} ${{ github.sha }} | grep '^binaries/' || true)
          
          if [ -z "$NEW_FILES" ]; then
            echo "No new binaries found in this push. Exiting smoothly."
            exit 0
          fi

          for file in $NEW_FILES; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              folder_name="${filename//./-}"
              out_dir="reports/$folder_name"
              
              mkdir -p "$out_dir"
              echo "Executing full analysis on $filename. Saving to $out_dir..."
              
              # Fast CLI Tools
              magika "$file" > "$out_dir/magika.txt"
              diec "$file" > "$out_dir/die.txt" || true
              capa "$file" > "$out_dir/capa.txt" || true
              floss --no-static "$file" > "$out_dir/floss.txt" || true
              rizin --appimage-extract-and-run -c "iI; ii; iE" -q "$file" > "$out_dir/rizin.txt" || true
              
              # Cloud Ghidra Auto-Analysis
              # This outputs a .gpr file and .rep folder directly into the out_dir
              echo "Starting Ghidra Auto-Analysis in the cloud..."
              ./ghidra/support/analyzeHeadless "$out_dir" "${folder_name}_project" -import "$file" || true
              
              # Zip everything (Reports + Ghidra Project)
              pushd "$out_dir" > /dev/null
              zip -r results.zip ./*
              popd > /dev/null
              
              echo "✅ Analysis, Ghidra Project generation, and ZIP complete for $filename."
            fi
          done

      - name: Upload Analysis Reports
        uses: actions/upload-artifact@v4
        with:
          name: reverse-engineering-reports
          path: reports/

      - name: Send Discord Notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No Discord Webhook configured. Skipping notification."
            exit 0
          fi

          PAYLOAD=$(cat <<EOF
          {
            "content": null,
            "embeds": [
              {
                "title": "🚨 New Malware Analysis Complete 🚨",
                "description": "The automated pipeline just finished processing new binaries in the \`take.action\` repository.",
                "color": 16711680,
                "fields": [
                  {
                    "name": "Pipeline Status",
                    "value": "✅ Capa, Magika, FLOSS, DIE, Rizin, and **Ghidra Auto-Analysis** completed."
                  },
                  {
                    "name": "Get the Report",
                    "value": "[⬇️ Download the ZIP Artifact here](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                  }
                ],
                "footer": {
                  "text": "Serverless RE-Analyzer"
                },
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              }
            ]
          }
          EOF
          )

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" $DISCORD_WEBHOOK
